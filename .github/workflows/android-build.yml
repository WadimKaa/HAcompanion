# Название нашего сценария (будет видно на GitHub)
name: Android CI Build

# КОГДА запускать этот сценарий? (Триггеры)
on:
  push:
    branches: [ "main" ] # Запускать при пуше в main
  pull_request:
    branches: [ "main" ] # Запускать при создании PR в main

# ЧТО делать? (Задачи)
jobs:
  build:
    # На каком компьютере запускать? (Берем последнюю убунту)
    runs-on: ubuntu-latest

    # ШАГИ выполнения (Steps)
    steps:
      # Шаг 1: Робот скачивает твой код из репозитория
      - name: Скачиваем код
        uses: actions/checkout@v4

      # Шаг 2: Робот устанавливает Java (нужна для сборки Android)
      - name: Устанавливаем Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Если у тебя старый проект, возможно тут нужно '11'
          distribution: 'temurin'

      # Шаг 3: Даем права на запуск скрипта сборки (очень важно для серверов Linux!)
      - name: Даем права файлу gradlew
        run: chmod +x gradlew

      # Шаг 4: Самое главное! Запускаем сборку тестового APK файла
      - name: Собираем APK
        run: ./gradlew assembleDebug